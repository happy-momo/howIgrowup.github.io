
<!-- books.html 部分核心代码 -->
<main class="page-content">
    <h1 class="section-title">阅览室</h1>
    <div class="book-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding: 0 10%;">
        <div class="book-card" style="background: white; padding: 40px; border: 1px solid #eee; transition: var(--transition-slow);">
            <div style="height: 2px; width: 30px; background: var(--accent); margin-bottom: 20px;"></div>
            <h3 style="font-size: 1.1rem;">《禅与摩托车维修艺术》</h3>
            <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 15px;">关于“良质”的终极探讨。</p>
        </div>
    </div>
</main>
